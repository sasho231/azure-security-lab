name: Bicep Validate and Security Scan

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

# These permissions are required for Workload Identity Federation
# id-token: write allows the pipeline to request an OIDC token from GitHub
# contents: read allows the pipeline to read your repository code
permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Lint, Build and Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x ./bicep
          sudo mv ./bicep /usr/local/bin/bicep
          bicep --version

      - name: Lint Bicep files
        run: |
          echo "Linting all Bicep files..."
          find . -name "*.bicep" | while read file; do
            echo "Linting: $file"
            bicep lint "$file"
          done
          echo "All Bicep files linted successfully"

      - name: Build Bicep files
        run: |
          echo "Building all Bicep files..."
          find . -name "*.bicep" | while read file; do
            echo "Building: $file"
            bicep build "$file"
          done
          echo "All Bicep files built successfully"

      - name: Checkov Security Scan
        run: |
          pip3 install checkov --quiet
          echo "============================================"
          echo "Running Checkov IaC Security Scan"
          echo "============================================"
          checkov -d infra/ \
            --framework bicep \
            --output cli
          echo "============================================"
          echo "Checkov scan complete"
          echo "============================================"

      - name: Pipeline Summary
        if: always()
        run: |
          echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bicep Lint | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Bicep Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkov Scan | ✅ Passed |" >> $GITHUB_STEP_SUMMARY

  what-if:
    name: Azure What-If Deployment
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Workload Identity Federation in action:
      # 1. GitHub generates a short-lived OIDC token for this run
      # 2. azure/login sends it to Entra ID
      # 3. Entra ID validates it against the federated credential we created
      # 4. Entra ID issues an Azure access token (valid 15 min)
      # 5. Pipeline uses that token for all subsequent az commands
      # No secrets involved at any point
      - name: Azure Login (Workload Identity Federation)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x ./bicep
          sudo mv ./bicep /usr/local/bin/bicep

      # What-If = terraform plan equivalent for Bicep
      # Connects to Azure, calculates what WOULD change
      # if we deployed right now, shows the diff
      # Does not create, modify or delete anything
      - name: Run What-If deployment
        run: |
          az deployment tenant validate \
            --location northeurope \
            --template-file infra/modules/management-groups/main.bicep \
            --parameters infra/parameters/lab.bicepparam \
            --no-prompt
