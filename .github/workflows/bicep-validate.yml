name: Bicep Validate and Security Scan

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint, Build and Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x ./bicep
          sudo mv ./bicep /usr/local/bin/bicep
          bicep --version

      - name: Lint Bicep files
        run: |
          echo "Linting all Bicep files..."
          find . -name "*.bicep" | while read file; do
            echo "Linting: $file"
            bicep lint "$file"
          done
          echo "All Bicep files linted successfully"

      - name: Build Bicep files
        run: |
          echo "Building all Bicep files..."
          find . -name "*.bicep" | while read file; do
            echo "Building: $file"
            bicep build "$file"
          done
          echo "All Bicep files built successfully"

      # Checkov scans your Bicep files for security misconfigurations
      # --soft-fail means findings are reported but pipeline still passes
      # This lets us see all findings without blocking progress in Phase 1
      # In production you would remove --soft-fail to enforce security gates
      - name: Checkov Security Scan
        run: |
          pip3 install checkov --quiet
          echo "============================================"
          echo "Running Checkov IaC Security Scan"
          echo "============================================"
          checkov -d infra/ \
            --framework bicep \
            --output cli \
            --soft-fail
          echo "============================================"
          echo "Checkov scan complete"
          echo "============================================"

      # Save results as SARIF for GitHub Security tab
      # SARIF is a standard format for security tool results
      # GitHub reads this file and shows findings in the Security tab
      - name: Export Checkov SARIF results
        if: always()
        run: |
          pip3 install checkov --quiet
          checkov -d infra/ \
            --framework bicep \
            --output sarif \
            --soft-fail \
            --output-file-path . \
            2>&1 | grep -v "^$" || true

      - name: Upload SARIF to GitHub Security tab
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: checkov-results
          path: results_bicep.sarif
          if-no-files-found: warn

  what-if:
    name: Azure What-If Deployment
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x ./bicep
          sudo mv ./bicep /usr/local/bin/bicep

      - name: Run What-If deployment
        run: |
          az deployment tenant what-if \
            --location northeurope \
            --template-file infra/modules/management-groups/main.bicep \
            --parameters infra/parameters/lab.bicepparam \
            --no-prompt
