name: Bicep Validate and Security Scan

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint, Build and Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x ./bicep
          sudo mv ./bicep /usr/local/bin/bicep
          bicep --version

      - name: Lint Bicep files
        run: |
          echo "Linting all Bicep files..."
          find . -name "*.bicep" | while read file; do
            echo "Linting: $file"
            bicep lint "$file"
          done
          echo "All Bicep files linted successfully"

      - name: Build Bicep files
        run: |
          echo "Building all Bicep files..."
          find . -name "*.bicep" | while read file; do
            echo "Building: $file"
            bicep build "$file"
          done
          echo "All Bicep files built successfully"

      # Checkov scans IaC files for security misconfigurations
      # Management groups have minimal checks - more findings appear
      # in Phase 4 when we deploy storage, VMs, Key Vault etc.
      - name: Checkov Security Scan
        run: |
          pip3 install checkov --quiet
          echo "============================================"
          echo "Running Checkov IaC Security Scan"
          echo "============================================"
          checkov -d infra/ \
            --framework bicep \
            --output cli \
            --soft-fail
          echo "============================================"
          echo "Checkov scan complete"
          echo "============================================"

      # Summary of what passed in this pipeline run
      - name: Pipeline Summary
        if: always()
        run: |
          echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bicep Lint | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Bicep Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkov Scan | ✅ Passed |" >> $GITHUB_STEP_SUMMARY

  what-if:
    name: Azure What-If Deployment
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Workload Identity Federation - no secrets stored in GitHub
      # Azure trusts GitHub's OIDC token directly
      # We configure this after Azure account is created
      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x ./bicep
          sudo mv ./bicep /usr/local/bin/bicep

      # What-If = terraform plan equivalent for Bicep
      # Shows exactly what WOULD be created/modified/deleted
      # without making any actual changes to Azure
      - name: Run What-If deployment
        run: |
          az deployment tenant what-if \
            --location northeurope \
            --template-file infra/modules/management-groups/main.bicep \
            --parameters infra/parameters/lab.bicepparam \
            --no-prompt
